      <header class="header">
        <a class="header__brand" href="./">

        <div class="header__actions">
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>

    <script src="js/config.js?v=20260628h"></script>
    <script src="js/footer.js?v=20260628h"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const brand = document.querySelector(".header__brand");
        if (brand && typeof SITE_CONFIG !== "undefined") {
          brand.innerHTML = `
            <h1>${SITE_CONFIG.brand.firstName}</h1>
            <h1>${SITE_CONFIG.brand.lastName}</h1>
          `;
        }
      });
    </script>
